<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Checker - Jotlad Schools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
        <h3 class="text-center mb-4">Check Your Result</h3>
        
        <input type="text" id="admissionNumber" class="form-control mb-3" placeholder="Enter Admission Number">
        <button onclick="checkAdmission()" class="btn btn-success w-100">Find Student</button>
        
        <div id="studentInfo" class="mt-3 d-none">
            <p>Welcome, <b id="studentName"></b></p>
            <select id="classSelect" class="form-select mb-2"></select>
            <select id="termSelect" class="form-select mb-2"></select>
            <select id="yearSelect" class="form-select mb-3"></select>
            <button onclick="getResult()" class="btn btn-primary w-100">View Result</button>
        </div>

        <div id="resultArea" class="mt-3 d-none">
            <a id="pdfLink" href="#" target="_blank" class="btn btn-success w-100">Download PDF Result</a>
        </div>
    </div>

    <script>
        async function checkAdmission() {
            const adm = document.getElementById('admissionNumber').value;
            const res = await fetch('/api/check-admission', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admissionNumber: adm })
            });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('studentName').textContent = data.studentName;
                document.getElementById('classSelect').innerHTML = data.results.map(r => `<option>${r.class}</option>`).join('');
                document.getElementById('termSelect').innerHTML = data.results.map(r => `<option>${r.term}</option>`).join('');
                document.getElementById('yearSelect').innerHTML = data.results.map(r => `<option>${r.year}</option>`).join('');
                
                document.getElementById('studentInfo').classList.remove('d-none');
            } else {
                alert('Invalid Admission Number');
            }
        }

        async function getResult() {
            const admissionNumber = document.getElementById('admissionNumber').value;
            const studentClass = document.getElementById('classSelect').value;
            const term = document.getElementById('termSelect').value;
            const year = document.getElementById('yearSelect').value;

            const res = await fetch('/api/get-result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admissionNumber, class: studentClass, term, year })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('pdfLink').href = data.result.pdfUrl;
                document.getElementById('resultArea').classList.remove('d-none');
            } else {
                alert('Result not found');
            }
        }
    </script>
</body>
</html>
