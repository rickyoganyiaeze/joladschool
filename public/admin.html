<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Jotlad Schools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 10px; }
    </style>
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Admin Dashboard</h2>
        <button onclick="location.href='/admin'" class="btn btn-outline-secondary">Logout</button>
    </div>

    <!-- Upload Form Card -->
    <div class="card p-4 shadow-sm mb-5">
        <h4 class="mb-3">Upload New Result (PDF)</h4>
        
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" id="admissionNumber" class="form-control" placeholder="Admission Number">
            </div>
            <div class="col-md-6">
                <input type="text" id="studentName" class="form-control" placeholder="Student Name">
            </div>
            <div class="col-md-4">
                <input type="text" id="className" class="form-control" placeholder="Class (e.g., JSS 1)">
            </div>
            <div class="col-md-4">
                <input type="text" id="term" class="form-control" placeholder="Term (e.g., 1st Term)">
            </div>
            <div class="col-md-4">
                <input type="text" id="year" class="form-control" placeholder="Year (e.g., 2024)">
            </div>
            <div class="col-12">
                <input type="file" id="pdfFile" accept=".pdf" class="form-control">
            </div>
            <div class="col-12">
                <button onclick="uploadResult()" class="btn btn-primary w-100">Upload Result</button>
            </div>
        </div>
        
        <div id="uploadMsg" class="mt-3 text-center fw-bold"></div>
    </div>

    <!-- Results List (Optional) -->
    <div class="card p-4 shadow-sm">
        <h4>Recent Uploads</h4>
        <div id="resultsList">Loading...</div>
    </div>

    <script>
        // Check if logged in
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/admin';
        }

        // Upload Function
        async function uploadResult() {
            const msgDiv = document.getElementById('uploadMsg');
            msgDiv.textContent = 'Uploading...';
            msgDiv.className = 'mt-3 text-center fw-bold text-primary';

            // Get values
            const admissionNumber = document.getElementById('admissionNumber').value;
            const studentName = document.getElementById('studentName').value;
            const className = document.getElementById('className').value;
            const term = document.getElementById('term').value;
            const year = document.getElementById('year').value;
            const fileInput = document.getElementById('pdfFile');

            // Validation
            if (!admissionNumber || !studentName || !className || !term || !year) {
                msgDiv.textContent = 'Please fill all fields.';
                msgDiv.className = 'mt-3 text-center fw-bold text-danger';
                return;
            }

            if (fileInput.files.length === 0) {
                msgDiv.textContent = 'Please select a PDF file.';
                msgDiv.className = 'mt-3 text-center fw-bold text-danger';
                return;
            }

            // Prepare Data
            const formData = new FormData();
            formData.append('admissionNumber', admissionNumber);
            formData.append('studentName', studentName);
            formData.append('class', className);
            formData.append('term', term);
            formData.append('year', year);
            formData.append('pdf', fileInput.files[0]); // <--- KEY LINE: Must be 'pdf'

            try {
                const res = await fetch('/api/admin/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const data = await res.json();

                if (data.success) {
                    msgDiv.textContent = '✅ Result uploaded successfully!';
                    msgDiv.className = 'mt-3 text-center fw-bold text-success';
                    // Clear form
                    document.getElementById('admissionNumber').value = '';
                    document.getElementById('studentName').value = '';
                    loadResults(); // Refresh list
                } else {
                    msgDiv.textContent = data.message || 'Upload failed.';
                    msgDiv.className = 'mt-3 text-center fw-bold text-danger';
                }
            } catch (err) {
                console.error(err);
                msgDiv.textContent = 'Connection error. Please try again.';
                msgDiv.className = 'mt-3 text-center fw-bold text-danger';
            }
        }

        // Load Results List
        async function loadResults() {
            try {
                const res = await fetch('/api/admin/results', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const list = document.getElementById('resultsList');
                
                if (data.success && data.results.length > 0) {
                    list.innerHTML = data.results.map(r => `
                        <div class="border-bottom p-2 d-flex justify-content-between align-items-center">
                            <div>
                                <b>${r.studentName}</b> (${r.admissionNumber}) - ${r.class} ${r.term} ${r.year}
                            </div>
                            <a href="${r.pdfUrl}" target="_blank" class="btn btn-sm btn-outline-primary">View</a>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p class="text-muted">No results found.</p>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        // Load results on page load
        loadResults();
    </script>
</body>
</html>
